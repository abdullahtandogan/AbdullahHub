<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Örneği</title>
  <style>
    body {
      background-color: black; /* Sayfa arka planı siyah */
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }

    video {
      width: 100%;
      max-width: 640px; /* Masaüstü sınırı */
      height: auto;
      display: block;
      margin: 0 auto;
      border: 2px solid #444; /* opsiyonel kenarlık */
    }
  </style>
</head>
<body>

<h2>Video Örneği</h2>

<video controls poster="kapak.webp">
  <source src="video.mp4" type="video/mp4">
  Tarayıcınız video etiketini desteklemiyor.
</video>

</body>
</html>
